paths:
  data_dir: ./data
  pipelines_dir: ./env_reports
  conda_envs_prefix: ./envs
  docker_output_dir: ./docker_images
  # Core test data convention: {data_dir}/core_test_data_{genome_build}/
  # Pipeline test data convention: {data_dir}/{pipeline_name}_test_data/

conda:
  base_channels:
    - bioconda
    - conda-forge
    - defaults
  python_version: "3.11"
  env_prefix: "bioinf_"

docker:
  base_image: "ubuntu:22.04"
  platform: "linux/amd64"
  registry: ""
  hpc:
    singularity_compatible: true
    no_root_user: true
    labels:
      hpc_compatible: "true"
      maintainer: ""

agent:
  model: "claude-sonnet-4-6"
  max_iterations: 60
  install_timeout_seconds: 3600
  test_timeout_seconds: 1800

testing:
  # Max reads to subset from test FASTQ files for validation runs
  max_reads: 100000
  # For human/mouse genomes, restrict the reference to this chromosome to keep
  # index builds and alignments fast. Falls back to chr1 if not found.
  preferred_chromosome: "chr22"
  fallback_chromosome: "chr1"
  # For non-standard organisms (no "chr" prefix), use the first sequence in the FASTA
