pipeline_name: bwa_samtools
description: Align short reads to a reference genome with BWA, then process alignments
  (sort, index, convert) with SAMtools.
conda_env: bioinf_bwa_samtools
python_version: '3.11'
docker_image: bioinf_bwa_samtools:latest
docker_build_status: "skipped \u2014 Docker daemon not running; re-run build_docker_image\
  \ when daemon is available"
packages:
- name: bwa
  requested_version: latest
  resolved_version: 0.7.19-r1273
  conda_spec: bwa=0.7.19
  channel: bioconda
  platform_note: 'bwa=0.7.3a not available for osx-arm64; resolved to latest available:
    0.7.19'
  description: "The BWA read mapper \u2014 Burrows-Wheeler Aligner for short-read\
    \ alignment to a reference genome"
  input_types:
  - fastq
  - fasta
  output_types:
  - sam
  verify_command: bwa 2>&1 | head -5
  verify_output: 'Program: bwa (alignment via Burrows-Wheeler transformation)

    Version: 0.7.19-r1273'
- name: samtools
  requested_version: latest
  resolved_version: 1.23.1
  conda_spec: samtools=1.23.1
  channel: bioconda
  htslib_version: 1.23.1
  description: "Tools for dealing with SAM, BAM and CRAM files \u2014 sort, index,\
    \ flagstat, idxstats, view"
  input_types:
  - sam
  - bam
  - cram
  output_types:
  - bam
  - cram
  - sam
  verify_command: samtools --version | head -3
  verify_output: 'samtools 1.23.1

    Using htslib 1.23.1'
- name: conda-pack
  channel: conda-forge
  purpose: HPC Docker image packaging
test_data:
  reads_source: exome_SRR1517830 (paired-end exome, human HG00096)
  reads_subset: 100,000 paired-end reads (400,000 lines each from R1/R2)
  reference: hg38 chr22 extracted from hg38_full/genome.fa (~49 MB)
  r1: /Users/ao33/Desktop/GIT_PROJECTS/bioinf_agent/data/test_data/bwa_samtools_test/reads_R1.fastq.gz
  r2: /Users/ao33/Desktop/GIT_PROJECTS/bioinf_agent/data/test_data/bwa_samtools_test/reads_R2.fastq.gz
  reference_fasta: /Users/ao33/Desktop/GIT_PROJECTS/bioinf_agent/data/test_data/bwa_samtools_test/chr22.fa
pipeline_steps:
- step: 1
  tool: bwa
  subcommand: index
  purpose: Build BWA FM-index for chr22 reference
  command: bwa index /path/to/chr22.fa
  index_files:
  - .amb
  - .ann
  - .bwt
  - .pac
  - .sa
  runtime_seconds: 31
  status: validated
- step: 2
  tool: bwa
  subcommand: mem
  purpose: Align paired-end reads to chr22 reference with read group tags
  command: bwa mem -t 4 -R '@RG\tID:SRR1517830\tSM:HG00096\tPL:ILLUMINA\tLB:exome'
    chr22.fa reads_R1.fastq.gz reads_R2.fastq.gz > aligned.sam
  input: reads_R1.fastq.gz + reads_R2.fastq.gz + chr22.fa (indexed)
  output: aligned.sam
  output_size_bytes: 45425260
  output_lines: 200028
  validation: passed
  validation_details:
    has_header: true
    sample_lines: 16
    type: sam
  status: validated
- step: 3
  tool: samtools
  subcommand: sort
  purpose: Coordinate-sort SAM and output compressed BAM
  command: samtools sort -@ 4 -o aligned_sorted.bam aligned.sam
  input: aligned.sam
  output: aligned_sorted.bam
  status: validated
- step: 4
  tool: samtools
  subcommand: index
  purpose: Index sorted BAM for random access
  command: samtools index aligned_sorted.bam
  output: aligned_sorted.bam.bai
  status: validated
- step: 5
  tool: samtools
  subcommand: flagstat + idxstats
  purpose: QC alignment statistics
  command: samtools flagstat aligned_sorted.bam && samtools idxstats aligned_sorted.bam
  output: aligned_sorted.bam
  output_size_bytes: 10185369
  validation: passed
  validation_details:
    total_reads: 200024
    primary_reads: 200000
    mapped_reads: 4510
    mapping_rate_pct: 2.25
    note: "Low mapping rate expected \u2014 reads from whole exome aligned to chr22\
      \ only; full-genome alignment yields >95%"
    properly_paired: 2812
    supplementary: 24
    type: bam
  status: validated
project_root: /Users/ao33/Desktop/GIT_PROJECTS/bioinf_agent
created_at: '2025-04-20'
