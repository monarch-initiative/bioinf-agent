pipeline_name: fastqc
description: Run FastQC quality control on paired-end exome sequencing FASTQ files.
conda_env: bioinf_fastqc
conda_env_path: /Users/ao33/Desktop/GIT_PROJECTS/bioinf_agent/envs/bioinf_fastqc
python_version: '3.11'
packages:
- name: fastqc
  version: 0.12.1
  channel: bioconda
  conda_spec: fastqc=0.12.1
  description: A quality control tool for high throughput sequence data.
  license: GPL >=3
  input_types:
  - fastq
  output_types:
  - html
  - zip
  homepage: http://www.bioinformatics.babraham.ac.uk/projects/fastqc/
- name: conda-pack
  version: 0.9.1
  channel: conda-forge
  conda_spec: conda-pack
  description: Tool to package conda environments for HPC/Docker deployment.
test_data:
  dataset_id: exome_SRR1517830
  type: exome
  subtype: paired_end
  description: Paired-end exome sequencing from human HG00096 (SRR1517830, EBI SRA
    1000 Genomes)
  organism: homo_sapiens
  genome_build: hg38
  r1: /Users/ao33/Desktop/GIT_PROJECTS/bioinf_agent/data/test_data/exome_SRR1517830/SRR1517830_1.fastq.gz
  r2: /Users/ao33/Desktop/GIT_PROJECTS/bioinf_agent/data/test_data/exome_SRR1517830/SRR1517830_2.fastq.gz
pipeline_steps:
- step: 1
  tool: fastqc
  version: 0.12.1
  command: fastqc /Users/ao33/Desktop/GIT_PROJECTS/bioinf_agent/data/test_data/exome_SRR1517830/SRR1517830_1.fastq.gz
    /Users/ao33/Desktop/GIT_PROJECTS/bioinf_agent/data/test_data/exome_SRR1517830/SRR1517830_2.fastq.gz
    --outdir /Users/ao33/Desktop/GIT_PROJECTS/bioinf_agent/data/test_data/exome_SRR1517830/fastqc_out
    --threads 2
  inputs:
  - /Users/ao33/Desktop/GIT_PROJECTS/bioinf_agent/data/test_data/exome_SRR1517830/SRR1517830_1.fastq.gz
  - /Users/ao33/Desktop/GIT_PROJECTS/bioinf_agent/data/test_data/exome_SRR1517830/SRR1517830_2.fastq.gz
  outputs:
    r1_html: /Users/ao33/Desktop/GIT_PROJECTS/bioinf_agent/data/test_data/exome_SRR1517830/fastqc_out/SRR1517830_1_fastqc.html
    r1_zip: /Users/ao33/Desktop/GIT_PROJECTS/bioinf_agent/data/test_data/exome_SRR1517830/fastqc_out/SRR1517830_1_fastqc.zip
    r2_html: /Users/ao33/Desktop/GIT_PROJECTS/bioinf_agent/data/test_data/exome_SRR1517830/fastqc_out/SRR1517830_2_fastqc.html
    r2_zip: /Users/ao33/Desktop/GIT_PROJECTS/bioinf_agent/data/test_data/exome_SRR1517830/fastqc_out/SRR1517830_2_fastqc.zip
  validation:
    r1_html:
      passed: true
