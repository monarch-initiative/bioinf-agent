pipeline: freebayes
pipeline_spec: ../../../../../config/pipelines/freebayes_1.3.10.yaml
conda_env: bioinf_freebayes
created_at: '2026-04-21'

tool_versions:
  freebayes: v1.3.10

inputs:
  genome_build: hg38
  chromosome_subset: chr22
  reference: ../../../genome/chr22.fa
  reference_fai: ../../../genome/chr22.fa.fai
  bam: ../../bwa_samtools/HG00096_SRR1517830/aligned_sorted.bam
  bai: ../../bwa_samtools/HG00096_SRR1517830/aligned_sorted.bam.bai

upstream_pipelines:
  - bwa_samtools

parameters:
  --min-mapping-quality: 20
  --min-base-quality: 20
  --min-alternate-fraction: 0.2
  --min-alternate-count: 2

outputs:
  - file: variants.vcf
    type: vcf
