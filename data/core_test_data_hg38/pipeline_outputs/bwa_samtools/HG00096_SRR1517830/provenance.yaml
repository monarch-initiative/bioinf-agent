pipeline: bwa_samtools
pipeline_spec: ../../../../../config/pipelines/bwa_samtools.yaml
conda_env: bioinf_bwa_samtools
created_at: '2025-04-20'

tool_versions:
  bwa: 0.7.19-r1273
  samtools: 1.23.1

inputs:
  genome_build: hg38
  chromosome_subset: chr22
  reference: ../../../genome/chr22.fa
  reference_fai: ../../../genome/chr22.fa.fai
  reads:
    - read_type: short_read
      end_type: paired_end
      assay_type: exome
      subset: 100K
      num_reads: 100000
      r1: ../../../short_read/paired_end/exome/SRR1517830_R1_100K.fastq.gz
      r2: ../../../short_read/paired_end/exome/SRR1517830_R2_100K.fastq.gz
      sample: HG00096
      accession: SRR1517830
      database: EBI_SRA

upstream_pipelines: []

outputs:
  - file: aligned.sam
    type: sam
    size_bytes: 45425260
    lines: 200028
  - file: aligned_sorted.bam
    type: bam
    size_bytes: 10185369
    indexed: true
  - file: aligned_sorted.bam.bai
    type: bai

validation:
  passed: true
  total_reads: 200024
  mapped_reads: 4510
  mapping_rate_pct: 2.25
  note: Low mapping rate expected — reads from whole exome aligned to chr22 only
