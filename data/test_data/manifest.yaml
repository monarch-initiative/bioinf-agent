datasets:
- id: exome_SRR1517830
  type: exome
  subtype: paired_end
  description: Paired-end exome sequencing from human HG00096 (SRR1517830, EBI SRA
    1000 Genomes)
  path: exome_SRR1517830/
  source:
    accession: SRR1517830
    r1_url: ftp://ftp.sra.ebi.ac.uk/vol1/fastq/SRR151/000/SRR1517830/SRR1517830_1.fastq.gz
    r2_url: ftp://ftp.sra.ebi.ac.uk/vol1/fastq/SRR151/000/SRR1517830/SRR1517830_2.fastq.gz
    database: EBI SRA
  files:
    r1: SRR1517830_1.fastq.gz
    r2: SRR1517830_2.fastq.gz
  metadata:
    organism: homo_sapiens
    genome_build: hg38
    sex: male
    protocol: PCR-free
    capture: whole_exome
    layout: paired
    is_real_data: true
  compatible_genomes:
  - hg38_full
  compatible_tools:
  - BWA
  - bwa-mem2
  - bowtie2
  - samtools
  - GATK
  - Picard
  - bcftools
  - DeepVariant
  - Mutect2
  - Strelka2
  - Trim_Galore
  - fastp
  - FastQC
  available: true
- id: rnaseq_small_paired_human
  type: rnaseq
  subtype: paired_end
  description: Small paired-end RNA-seq from human HCT116 cells, chr22 reads only
  path: rnaseq_small_paired_human/
  files:
    r1: reads_R1.fastq.gz
    r2: reads_R2.fastq.gz
  metadata:
    organism: homo_sapiens
    genome_build: hg38
    tissue: colon_cancer_cell_line
    read_length: 150
    num_reads: 200000
    strandedness: reverse
    layout: paired
  compatible_genomes:
  - hg38_full
  - hg38_chr22
  compatible_tools:
  - STAR
  - HISAT2
  - featureCounts
  - HTSeq
  - Salmon
  - kallisto
  - StringTie
  - DESeq2
  - edgeR
  available: false
- id: wgs_small_paired_human
